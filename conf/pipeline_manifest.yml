settings:
  run_mode: "local" # Toggle to "databricks" for cloudFiles/Auto-Loader
  catalog: "nff_catalog_78b3_dev"
  local_base_path: "./data"
  cloud_base_path: "abfss://data@dev.dfs.core.windows.net"

tables:
  # --- BRONZE LAYER ---
  # The "catch-all" entry point for files from the NexusDataGenerator
  - name: "universal_raw_ingestion"
    type: "bronze"
    source_path: "/landing/"
    target_table: "bronze_raw.universal_raw"
    external_location: "/bronze"

  # --- SILVER LAYER: SCENARIO 1 (Nested & Corrupted JSON) ---
  # Tests: explode_outer logic and complex schema parsing
  - name: "transactions_nested_silver"
    type: "silver"
    format: "json"
    source_table: "bronze_raw.universal_raw"
    target_table: "silver_refined.transactions_json"
    # Matches the _nest_data structure from your generator
    schema: "store_id STRING, tx_date STRING, items ARRAY<STRUCT<tx_id: STRING, amount: DOUBLE, region: STRING, tx_time: STRING>>"
    explode_col: "items"
    external_location: "/silver_nested"
    rules:
      - "amount > 0"           # Filters the -99.99 corruption
      - "tx_id IS NOT NULL"    # Filters the null_id corruption
      - "region IS NOT NULL"  # Filters the bad_region corruption

  # --- SILVER LAYER: SCENARIO 2 (Flat & Dirty CSV) ---
  # Tests: Standard parsing and string-to-double casting
  - name: "transactions_legacy_silver"
    type: "silver"
    format: "csv"
    source_table: "bronze_raw.universal_raw"
    target_table: "silver_refined.transactions_csv"
    schema: "tx_id STRING, amount DOUBLE, region STRING, tx_time STRING"
    external_location: "/silver_legacy"
    rules:
      - "amount IS NOT NULL"   # Catches the "CORRUPT_STRING" injection
      - "amount > 0"
    cluster_by: ["region"]


  # --- SILVER LAYER: SCENARIO 3 (Binary Parquet) ---
  # Tests: Direct pass-through logic (skipping payload parsing)
  - name: "sensors_parquet_silver"
    type: "silver"
    format: "parquet"
    source_table: "bronze_raw.universal_raw"
    target_table: "silver_refined.transactions_parquet"
    schema: "tx_id STRING, amount DOUBLE, region STRING, tx_time STRING"
    external_location: "/silver_parquet"
    rules:
      - "amount IS NOT NULL"

  # --- GOLD LAYER ---
  # Aggregates results from the Nested Silver table for NZ reporting
  - name: "regional_kpi_gold"
    type: "gold"
    source_table: "silver_refined.transactions_json"
    target_table: "gold_analytics.regional_kpis"
    external_location: "/gold"
    group_by: ["region"]
    aggregations:
      total_revenue: "sum(amount)"
      transaction_count: "count(tx_id)"
      avg_ticket_size: "avg(amount)"
      last_transaction_at: "max(tx_time)"
    sort_by: "total_revenue"
    cluster_by: ["region"]