# conf/pipeline_manifest.yml
settings:
  run_mode: "local"
  local_base_path: "./data"
  seed_data: true
  number_of_records: 20
  catalog: "nff_catalog"
  admin_group: "nff_admin"
  steward_group: "nff_data_stewards"
  storage_root: "abfss://data@nexusstorage.dfs.core.windows.net/nexusflow"

layers:
  bronze:
    schema: "bronze_raw"
    path: "bronze"
  silver:
    schema: "silver_refined"
    path: "silver"
  gold:
    schema: "gold_analytics"
    path: "gold"
    
tables:
  # --- SILVER LAYER (Streaming) ---
  - name: "transactions_silver"
    type: "silver"
    source_path: "/landing/transactions/"
    target_path: "/silver/transactions/"          # Physical folder
    target_table: "nff_catalog.silver.transactions" # Catalog entry
    target_quarantine_path: "/quarantine/transactions/"
    target_quarantine: "nff_catalog.quarantine.transactions"
    rules_method: "get_transaction_rules"
    cluster_by: ["region"]

  # --- GOLD LAYER (Batch) ---
  - name: "regional_kpis_gold"
    type: "gold"
    source_table: "nff_catalog.silver.transactions"
    target_path: "/gold/regional_kpis/"            # Physical folder
    target_table: "nff_catalog.gold.regional_kpis"   # Catalog entry
    cluster_by: ["region"]