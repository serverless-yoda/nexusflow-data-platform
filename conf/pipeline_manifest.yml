settings:
  run_mode: "local" # options: "local", "databricks"
  catalog: "nff_catalog"
  local_base_path: "./data"
  cloud_base_path: "abfss://data@storage.dfs.core.windows.net"

tables:
  - name: "universal_raw_ingestion"
    type: "bronze"
    source_path: "/landing/raw/"
    target_table: "bronze.universal_raw"
    external_location: "/bronze"

  - name: "transactions_silver"
    type: "silver"
    source_table: "bronze.universal_raw"
    target_table: "silver.transactions"
    external_location: "/silver"
    format: "json"
    rules:
      - "amount > 0"
      - "region IS NOT NULL"
    cluster_by: ["region"]

  - name: "regional_kpi_gold"
    type: "gold"
    source_table: "silver.transactions"
    target_table: "gold.regional_kpis"
    external_location: "/gold"
    cluster_by: ["report_date"]