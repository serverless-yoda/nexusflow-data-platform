# conf/pipeline_manifest.yml
settings:
  run_mode: "databricks"
  local_base_path: "./data"
  seed_data: false
  number_of_records: 20
  catalog: "nff_catalog_cd21_dev"
  admin_group: "nff_admin"
  steward_group: "nff_data_stewards"
  storage_root: "abfss://data@nexuscd21storagedev.dfs.core.windows.net/nexusflow"

layers:
  bronze:
    schema: "bronze_raw"
    path: "bronze"
  silver:
    schema: "silver_refined"
    path: "silver"
  gold:
    schema: "gold_analytics"
    path: "gold"

tables:
  # --- BRONZE LAYER (Streaming) ---
  - name: "transactions_bronze"
    type: "bronze"
    source_path: "/landing/transactions/"
    check_point: "/checkpoints/bronze/"
    target_table: "nff_catalog_cd21_dev.bronze_raw.transactions" # Catalog entry
    cluster_by: ["_ingested_at"]

  # --- SILVER LAYER (Streaming) ---
  - name: "transactions_silver"
    type: "silver"
    
    source_table: "nff_catalog_cd21_dev.bronze_raw.transactions"
    check_point: "/checkpoints/transactions/"
    
    target_path: "/silver/transactions/"
    target_table: "nff_catalog_cd21_dev.silver_refined.transactions" # Catalog entry
    target_quarantine_path: "/quarantine/transactions/"
    target_quarantine: "nff_catalog_cd21_dev.quarantine.transactions"
    rules_method: "get_transaction_rules"
    cluster_by: ["region"]

  # --- GOLD LAYER (Batch) ---
  - name: "regional_kpis_gold"
    type: "gold"
    source_table: "nff_catalog_cd21_dev.silver_refined.transactions"
    target_path: "/gold/regional_kpis/"            # Physical folder
    target_table: "nff_catalog_cd21_dev.gold_analytics.regional_kpis"   # Catalog entry
    cluster_by: ["region"]