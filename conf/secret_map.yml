# conf/secret_map.yml

# This file maps internal 'Logical Keys' used in Python 
# to the 'Physical Secret Names' defined in Azure Key Vault.

secrets:
  # Storage Connectivity
  storage_account_key: "nff-storage-access-key"
  storage_connection_string: "nff-storage-conn-string"

  # Service Principal / Identity
  client_id: "nff-sp-client-id"
  client_secret: "nff-sp-client-secret"

  # External API Integrations (e.g., Currency Exchange)
  fx_api_key: "nff-fixer-io-api-key"

metadata:
  scope_name: "nff-secrets"
  key_vault_name: "kv-nexusflow-${env}"