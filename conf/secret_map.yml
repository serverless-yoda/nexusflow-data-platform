# conf/secret_map.yml

# This file maps internal 'Logical Keys' used in Python 
# to the 'Physical Secret Names' defined in Azure Key Vault.

secrets:
  scope: "nexus-flow-scope"

  mappings:
    client_id: "AZURE-CLIENT-ID"
    client_secret: "AZURE-CLIENT-SECRET"
    tenant_id: "AZURE-TENANT-ID"

  metadata:
    scope_name: "nff-secrets"
    key_vault_name: "kv-nexusflow-${env}"
    storage_account: "nexusstorage"
    endpoint: "dfs.core.windows.net"

